name: Test

on:
  push:
    branches:
      - 'master'
      - 'release-'
    tags:
      - '*'
  pull_request:

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1'
          - 'nightly'
        os:
          - ubuntu-latest
        include:
          - os: windows-latest
            version: '1'
          - os: macOS-latest
            version: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: "src,juliac"
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          plugins: noop
          disable_search: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  apps:
    name: Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v3
      - name: Add ~/.julia/bin to PATH
        run: echo "$HOME/.julia/bin" >> $GITHUB_PATH
      - name: Install apps
        run: julia -e 'using Pkg; Pkg.activate("."); Pkg.instantiate(); Pkg.Apps.develop(path=".")'
      - name: Smoketest
        run: |
          runic --version | grep -q "runic version"
          runic_help=$(runic --help) && printf '%s' "$runic_help" | grep -q "julia -m Runic"
          printf '1+1' | runic | grep -qx "1 + 1"
          git_runic_help=$(git-runic --help) && printf '%s' "$git_runic_help" | grep -q "git runic \[OPTIONS\]"
          git-runic --diffstat | grep -q "no modified files to format"
          git runic --diffstat | grep -q "no modified files to format"
